version: '3'

services:
  plex:
    image: plexinc/pms-docker:latest
    container_name: plex
    restart: unless-stopped
    environment:
      - TZ=America/New_York  # Set your timezone
      - PLEX_CLAIM=claim-HbLECRSsEmjRnHEiU1zo        # Optional: Your Plex claim token (from https://www.plex.tv/claim/)
      - PLEX_UID=1000        # User ID to run Plex as (match with your user)
      - PLEX_GID=1000        # Group ID to run Plex as (match with your user)
    network_mode: host       # Best for Plex to discover devices on local network
    volumes:
      - ./config:/config     # Plex configuration data
      - ./transcode:/transcode  # Temporary transcoding directory
      - ./media:/data   # Replace with path to your media
    devices:
      - /dev/dri:/dev/dri    # Optional: For hardware transcoding if available